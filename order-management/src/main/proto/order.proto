syntax = "proto3";

package order;

option java_multiple_files = true;
option java_package = "com.meghana.practice.order_management.grpc";
option java_outer_classname = "OrderProto";

enum OrderStatus {
  CREATED = 0;
  CONFIRMED = 1;
  SHIPPED = 2;
  DELIVERED = 3;
  CANCELLED = 4;
}

message Order {
  string orderId = 1;
  string customerId = 2;
  string productName = 3;
  int32 quantity = 4;
  double price = 5;
  OrderStatus status = 6;
}

message CreateOrderRequest {
  string customerId = 1;
  string productName = 2;
  int32 quantity = 3;
  double price = 4;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string orderId = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message UpdateOrderRequest {
  string orderId = 1;
  string customerId = 2;
  string productName = 3;
  int32 quantity = 4;
  double price = 5;
  OrderStatus status = 6;
}

message UpdateOrderResponse {
  Order order = 1;
}

message DeleteOrderRequest {
  string orderId = 1;
}

message DeleteOrderResponse {
  string message = 1;
}

service OrderService {

  rpc CreateOrder(CreateOrderRequest)
      returns (CreateOrderResponse);

  rpc GetOrder(GetOrderRequest)
      returns (GetOrderResponse);

  rpc UpdateOrder(UpdateOrderRequest)
      returns (UpdateOrderResponse);

  rpc DeleteOrder(DeleteOrderRequest)
      returns (DeleteOrderResponse);
}